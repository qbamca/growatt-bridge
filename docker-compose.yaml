services:
  growatt-bridge:
    build: .
    env_file: .env
    ports:
      - "8081:8081"
    volumes:
      # Persist the append-only audit log outside the container
      - ./audit:/var/log/growatt-bridge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
